services:
  insurance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-insurance-advisor
    ports:
      - "5000:5000"
    environment:
      # Optional: enable Claude AI reports by setting this
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/stats').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
