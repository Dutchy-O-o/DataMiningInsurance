version: '3.8'

services:
  insurance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-insurance-advisor
    ports:
      - "5000:5000"
    environment:
      # Optional: set your Anthropic API key to enable Claude AI reports
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    volumes:
      # Mount model directory (optional — allows retraining without rebuilding)
      - ./DataSet/saved_models:/app/DataSet/saved_models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
